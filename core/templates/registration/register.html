<div class="min-h-screen flex items-center justify-center bg-gradient-to-br from-blue-50 to-indigo-100 px-4">
  <div class="w-full max-w-md bg-white rounded-xl shadow-lg p-8">
    <h1 class="text-3xl font-bold text-center text-indigo-700 mb-2 tracking-tight">SkillSync</h1>
    <h2 class="text-xl font-semibold text-center text-gray-800 mb-6">Create your account</h2>

    <form method="post" class="space-y-4">
      {% csrf_token %}
      {{ form.as_p }}

      <button type="submit"
              class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 px-4 rounded-lg transition duration-200">
        Sign Up
      </button>
    </form>

    <p class="mt-6 text-center text-sm text-gray-600">
      Already have an account?
      <a href="/accounts/login/" class="text-indigo-600 hover:underline font-medium">Login here</a>
    </p>
  </div>
</div>
