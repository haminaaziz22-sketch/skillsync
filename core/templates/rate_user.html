{% extends 'base.html' %}
{% block content %}

<div class="max-w-2xl mx-auto my-12 p-6 bg-white rounded-2xl shadow-lg border border-gray-100">
    <!-- Header -->
    <h2 class="text-3xl font-extrabold text-indigo-700 mb-4 text-center">
        Rate {{ receiver.username }}
    </h2>
    <p class="text-gray-500 text-center mb-6">
        Share your feedback and score to help others know more.
    </p>

    <form method="post" class="space-y-8">
        {% csrf_token %}

        <!-- PREMIUM 5-STAR RATING -->
        <div class="flex flex-col space-y-3">
            <label class="block font-semibold text-gray-700">Score:</label>

            <!-- Tooltip -->
            <div id="rating-tooltip" 
                 class="text-center text-sm font-medium text-indigo-600 h-5 transition"></div>

            <!-- Stars -->
            <div id="star-container" class="flex justify-center gap-3 select-none">
                {% for i in "12345" %}
                    <svg data-value="{{ forloop.counter }}" 
                         class="star w-12 h-12 cursor-pointer transition-transform duration-150 transform hover:scale-125 text-gray-300"
                         fill="url(#grad)" viewBox="0 0 20 20">
                        <defs>
                            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#facc15"/>
                                <stop offset="100%" stop-color="#f97316"/>
                            </linearGradient>
                        </defs>
                        <path d="M9.049 2.927c.3-.921 1.603-.921 1.902 0l1.286 3.957a1 1 0 00.95.69h4.162c.969 0 1.371 1.24.588 1.81l-3.37 2.448a1 1 0 00-.364 1.118l1.287 3.957c.3.921-.755 1.688-1.54 1.118l-3.37-2.448a1 1 0 00-1.175 0l-3.37 2.448c-.784.57-1.838-.197-1.539-1.118l1.287-3.957a1 1 0 00-.364-1.118L2.072 9.384c-.783-.57-.38-1.81.588-1.81h4.162a1 1 0 00.95-.69l1.286-3.957z"/>
                    </svg>
                {% endfor %}
            </div>

            <!-- Emoji Reaction -->
            <div id="emoji-display" class="text-center text-4xl mt-2 transition"></div>

            <!-- Hidden Input -->
            <input type="hidden" name="score" id="score-input">
        </div>

        <!-- Comment Section -->
        <div class="flex flex-col">
            <label class="block font-semibold text-gray-700 mb-2">Comment:</label>
            <textarea name="comment" rows="5"
                      placeholder="Write your feedback..."
                      class="resize-none border border-gray-300 rounded-xl p-4 focus:ring-2 focus:ring-indigo-300 focus:outline-none transition placeholder-gray-400"></textarea>
        </div>

        <!-- Submit Button -->
        <div class="text-center">
            <button type="submit"
                    class="bg-indigo-600 hover:bg-indigo-700 text-white font-medium px-8 py-3 rounded-xl shadow-md transition transform hover:-translate-y-0.5">
                Submit Rating
            </button>
        </div>
    </form>
</div>

<!-- Glow Effect -->
<style>
.star.glow {
    filter: drop-shadow(0 0 10px rgba(250, 204, 21, 0.9));
}
.star.selected {
    transform: scale(1.25);
}
</style>

<!-- JS LOGIC -->
<script>
document.addEventListener("DOMContentLoaded", () => {
    const stars = document.querySelectorAll("#star-container .star");
    const scoreInput = document.getElementById("score-input");
    const tooltip = document.getElementById("rating-tooltip");
    const emojiDisplay = document.getElementById("emoji-display");

    const labels = {
        1: "Terrible",
        2: "Bad",
        3: "Okay",
        4: "Good",
        5: "Excellent"
    };

    const emojis = {
        1: "💀",
        2: "😒",
        3: "😐",
        4: "🙂",
        5: "🤩"
    };

    function highlight(limit) {
        stars.forEach(star => {
            const value = parseInt(star.dataset.value);
            star.classList.toggle("text-gray-300", value > limit);
            star.classList.toggle("glow", value <= limit);
        });
    }

    stars.forEach(star => {
        star.addEventListener("mouseover", () => {
            const value = parseInt(star.dataset.value);
            highlight(value);
            tooltip.textContent = labels[value];
            emojiDisplay.textContent = emojis[value];
        });

        star.addEventListener("mouseout", () => {
            const value = parseInt(scoreInput.value) || 0;
            highlight(value);
            tooltip.textContent = value ? labels[value] : "";
            emojiDisplay.textContent = value ? emojis[value] : "";
        });

        star.addEventListener("click", () => {
            const value = parseInt(star.dataset.value);
            scoreInput.value = value;

            // Remove previous selection animation
            stars.forEach(s => s.classList.remove("selected"));

            // Pop animation on selected star
            star.classList.add("selected");
            setTimeout(() => star.classList.remove("selected"), 200);

            highlight(value);
            tooltip.textContent = labels[value];
            emojiDisplay.textContent = emojis[value];
        });
    });
});
</script>

{% endblock %}
