{% extends 'core/base.html' %}
{% block content %}
<div class="max-w-3xl mx-auto mt-12 bg-white shadow-2xl rounded-xl p-10">

  <h2 class="text-3xl font-bold text-indigo-700 mb-6">Create Offer</h2>

  <form method="post" class="space-y-6">
    {% csrf_token %}

    <div>
      <label class="block font-medium text-gray-700 mb-1">Description:</label>
      {{ form.description }}
    </div>

    <div>
      <label class="block font-medium text-gray-700 mb-1">Offered Skill (must be one you have):</label>
      {{ form.offered_skill }}
    </div>

    <div>
      <label class="block font-medium text-gray-700 mb-1">Requested Skill:</label>
      {{ form.requested_skill_name }}
    </div>

    <button type="submit"
            class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition font-medium">
      Create Offer
    </button>
  </form>
</div>
{% endblock %}
