{% extends 'core/base.html' %}
{% block content %}

<h2 class="text-3xl font-extrabold text-indigo-700 mb-6">Rate {{ receiver.username }}</h2>

<form method="post" class="p-6 border rounded-xl shadow bg-white space-y-4">
    {% csrf_token %}

    <div>
        <label class="block font-medium text-gray-700">Score (1–5):</label>
        <input type="number" name="score" min="1" max="5"
               class="mt-1 border rounded-lg p-2 w-24 focus:ring focus:ring-blue-300">
    </div>

    <div>
        <label class="block font-medium text-gray-700">Comment:</label>
        <textarea name="comment" rows="4" class="mt-1 border rounded-lg p-2 w-full focus:ring focus:ring-blue-300"></textarea>
    </div>

    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-6 py-2 rounded-lg transition">
        Submit Rating
    </button>
</form>

{% endblock %}
