{% extends 'core/base.html' %}
{% block content %}

<!-- CHAT HEADER -->
<div class="flex items-center space-x-3 mb-4 p-4 bg-white shadow rounded-lg">
    <img src="https://ui-avatars.com/api/?name={{ offer.creator.username }}" 
         class="w-12 h-12 rounded-full border" />

    <div>
        <p class="font-bold text-lg">
            Chat with 
            {% if request.user == offer.creator %}
                {{ offer.matched_user.username }}
            {% else %}
                {{ offer.creator.username }}
            {% endif %}
        </p>
        <p id="online-status" class="text-sm text-gray-500">Offline</p>
    </div>
</div>

<!-- CHAT BOX -->
<div id="chat-box" class="h-96 overflow-y-scroll border rounded-lg p-4 bg-gray-50 space-y-3 shadow">
</div>

<!-- TYPING INDICATOR -->
<p id="typing-indicator" class="text-gray-500 text-sm mt-2 hidden">
    The other user is typing...
</p>

<!-- MESSAGE INPUT -->
<form method="post" class="mt-4 flex flex-col md:flex-row gap-2">
    {% csrf_token %}
    <div class="flex items-center gap-2 flex-1">
        <!-- Emoji Picker -->
        <button type="button" onclick="toggleEmojiPicker()" class="text-2xl">😊</button>

        <textarea id="message-input" name="text" rows="2"
                  class="flex-1 border rounded-lg p-2 focus:ring focus:ring-blue-300"
                  placeholder="Type your message..."></textarea>
    </div>

    <button type="submit" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">
        Send
    </button>
</form>

<!-- EMOJI PICKER -->
<div id="emoji-picker" class="hidden mt-2 p-3 border rounded-lg bg-white shadow grid grid-cols-8 gap-2 text-xl">
    <span onclick="addEmoji('😀')">😀</span>
    <span onclick="addEmoji('😂')">😂</span>
    <span onclick="addEmoji('😍')">😍</span>
    <span onclick="addEmoji('😎')">😎</span>
    <span onclick="addEmoji('😭')">😭</span>
    <span onclick="addEmoji('👍')">👍</span>
    <span onclick="addEmoji('🔥')">🔥</span>
    <span onclick="addEmoji('❤️')">❤️</span>
</div>

<script>
function toggleEmojiPicker() {
    document.getElementById("emoji-picker").classList.toggle("hidden");
}

function addEmoji(emoji) {
    const input = document.getElementById("message-input");
    input.value += emoji;
}

function loadMessages() {
    fetch("/fetch_messages/{{ offer.id }}/")
        .then(res => res.json())
        .then(data => {
            const box = document.getElementById("chat-box");
            box.innerHTML = "";

            data.messages.forEach(msg => {
                const isSender = msg.sender === "{{ request.user.username }}";
                box.innerHTML += `
                    <div class="flex ${isSender ? 'justify-end' : 'justify-start'}">
                        <div class="max-w-xs p-3 rounded-lg shadow 
                            ${isSender ? 'bg-blue-600 text-white' : 'bg-gray-200 text-gray-900'}">
                            <p class="font-semibold">${msg.sender}</p>
                            <p>${msg.text}</p>
                            <p class="text-xs mt-1 opacity-70">${new Date(msg.timestamp).toLocaleString()}</p>
                        </div>
                    </div>
                `;
            });

            box.scrollTop = box.scrollHeight;
        });
}

// Typing indicator simulation
document.getElementById("message-input").addEventListener("input", () => {
    const indicator = document.getElementById("typing-indicator");
    indicator.classList.remove("hidden");
    setTimeout(() => indicator.classList.add("hidden"), 1500);
});

setInterval(loadMessages, 2000);
loadMessages();
</script>

{% endblock %}
